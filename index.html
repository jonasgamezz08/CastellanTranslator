<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kestelál — Castellan Language Workbench</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f07;
  --bg2: #111a0a;
  --bg3: #162010;
  --bg4: #1d2b15;
  --green-deep: #1a3a12;
  --green-mid: #2d5a1e;
  --green-bright: #4a8a30;
  --green-glow: #6db84a;
  --green-light: #9ed97a;
  --green-pale: #c8edae;
  --amber: #c8922a;
  --amber-light: #e8b840;
  --text: #d4e8b8;
  --text-dim: #7a9960;
  --text-muted: #4a6335;
  --border: #2a4020;
  --border-glow: #3a5a28;
  --ink: #e8f5d0;
  --shadow: rgba(0,0,0,0.6);
  --radius: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(74,138,48,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(26,58,18,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 2.5rem 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(10,15,7,0.95) 0%, transparent 100%);
}

.title-rune {
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--text-muted);
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 0.6rem;
}

h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 700;
  color: var(--green-light);
  letter-spacing: 0.08em;
  line-height: 1.1;
  text-shadow: 0 0 40px rgba(109,184,74,0.3);
}

.subtitle {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1.05rem;
  color: var(--text-dim);
  margin-top: 0.4rem;
}

nav {
  position: relative;
  z-index: 10;
  display: flex;
  gap: 0;
  padding: 0 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  overflow-x: auto;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 0.85rem 1.3rem;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.2s, border-color 0.2s;
}
nav .tab-btn:hover { color: var(--text-dim); }
nav .tab-btn.active {
  color: var(--green-glow);
  border-bottom-color: var(--green-glow);
}

main {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem 1rem 4rem;
}

.panel { display: none; }
.panel.active { display: block; }

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

.card-title {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.card-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

textarea, input[type=text], select {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--ink);
  font-family: 'EB Garamond', serif;
  font-size: 1rem;
  padding: 0.6rem 0.8rem;
  width: 100%;
}

.btn {
  background: var(--green-deep);
  border: 1px solid var(--green-mid);
  border-radius: var(--radius);
  color: var(--green-pale);
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 0.06em;
  padding: 0.55rem 1.3rem;
  cursor: pointer;
}
.btn:hover { background: var(--green-mid); border-color: var(--green-bright); }

.result-box {
  background: var(--bg3);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius);
  padding: 1.1rem 1.3rem;
  margin-top: 1rem;
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--ink);
}

.direction-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
}

.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
  margin-top: 0.8rem;
}
th {
  background: var(--bg3);
  color: var(--green-bright);
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.5rem 0.7rem;
  border: 1px solid var(--border);
}
td {
  padding: 0.45rem 0.7rem;
  border: 1px solid var(--border);
  color: var(--text);
}
.td-kas { color: var(--green-glow); font-family: 'Cinzel', serif; font-weight: 600; }

.dict-entry {
  border-bottom: 1px solid var(--border);
  padding: 0.7rem 0;
  display: grid;
  grid-template-columns: 240px 80px 1fr;
  gap: 0.5rem 1rem;
  align-items: baseline;
}
.de-word { font-family: 'Cinzel', serif; color: var(--green-glow); }
.de-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--amber);
  background: rgba(200,146,42,0.1);
  padding: 1px 5px;
  border-radius: 3px;
  text-align: center;
}

.gloss-row { display: flex; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 1rem; }
.gloss-word {
  display: flex;
  flex-direction: column;
  background: rgba(255,255,255,0.02);
  padding: 0.75rem 1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  flex: 1;
  min-width: 260px;
}
.gloss-source { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--green-light); margin-bottom: 0.2rem; }
.gloss-target { color: var(--ink); font-size: 1rem; font-weight: 500; }
.gloss-details { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--amber-light); margin-top: 0.4rem; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 3px; border-left: 3px solid var(--amber); white-space: pre-line; }

#notif {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  background: var(--bg3);
  border: 1px solid var(--green-mid);
  border-radius: var(--radius);
  padding: 0.7rem 1.2rem;
  font-size: 0.88rem;
  color: var(--green-pale);
  z-index: 9999;
  transform: translateY(80px);
  opacity: 0;
  transition: transform 0.3s, opacity 0.3s;
}
#notif.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div id="notif"></div>

<header>
  <div class="title-rune">᛭ Kodikus Gramátai ᛭</div>
  <h1>Kestelál</h1>
  <div class="subtitle">Branching Morphosyntactic Classification Engine</div>
</header>

<nav>
  <button class="tab-btn active" data-tab="translate">Translate</button>
  <button class="tab-btn" data-tab="gloss">Glossing & Analysis</button>
  <button class="tab-btn" data-tab="grammar">Grammar & Conjugation</button>
  <button class="tab-btn" data-tab="dictionary">Dictionary</button>
</nav>

<main>

<div id="tab-translate" class="panel active">
  <div class="card">
    <div class="card-title">Direction of Translation</div>
    <div class="direction-row">
      <label><input type="radio" name="direction" value="kes-eng" checked> Kestelál → English</label>
      <label><input type="radio" name="direction" value="eng-kes"> English → Kestelál</label>
    </div>
    <textarea id="translate-input" placeholder="Enter text... (Try: 'Myp on sutír' or 'Meep / The Light Incarnate will save/guard/protect us.')"></textarea>
    <button class="btn" style="margin-top:0.7rem" onclick="doTranslate()">Translate</button>
    <div id="translate-result" class="result-box" style="display:none"></div>
  </div>
</div>

<div id="tab-gloss" class="panel">
  <div class="card">
    <div class="card-title">Advanced Morphological Analyzer</div>
    <input type="text" id="gloss-input" placeholder="Enter words (e.g. Myp on sutír)">
    <button class="btn" style="margin-top:0.7rem" onclick="doGloss()">Analyse Word Morphology</button>
    <div id="gloss-result" class="result-box" style="display:none"></div>
  </div>
</div>

<div id="tab-grammar" class="panel">
  <div class="card">
    <div class="card-title">Noun Paradigms</div>
    <div class="grid-2">
      <input type="text" id="decl-word" placeholder="Nominative form (e.g. kas, path, varas, myp)">
      <button class="btn" onclick="doDeclension()">Decline Noun</button>
    </div>
    <div id="decl-result"></div>
  </div>

  <div class="card">
    <div class="card-title">Verb Systems</div>
    <div class="grid-2">
      <input type="text" id="verb-input" placeholder="Infinitive (e.g. brenár, sutár, subadár)">
      <button class="btn" onclick="doConjugate()">Generate Verb Matrix</button>
    </div>
    <div id="verb-result"></div>
  </div>
</div>

<div id="tab-dictionary" class="panel">
  <div class="card">
    <div class="card-title">Active Lexicon Index Search</div>
    <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
      <input type="text" id="dict-search" placeholder="Type here to search words..." style="width: 100%;">
      <div style="white-space: nowrap; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--amber); background: rgba(200,146,42,0.1); padding: 6px 12px; border-radius: var(--radius); border: 1px solid rgba(200,146,42,0.2);">
        Total Words: <span id="total-counter" style="color: var(--green-light); font-weight: bold;">0</span>
      </div>
    </div>
    <div id="dict-list" style="max-height:400px; overflow-y:auto;"></div>
  </div>
</div>

</main>

<script>
let CORE_DICT = [];

const EMERGENCY_FALLBACK_DICT = [
  {k:"es",t:"PRON",e:"I",case:"nominative",num:"singular"},
  {k:"en",t:"PRON",e:"me",case:"accusative",num:"singular"},
  {k:"ei",t:"PRON",e:"my",case:"genitive",num:"singular"},
  {k:"eu",t:"PRON",e:"with me",case:"instrumental",num:"singular"},
  {k:"as",t:"PRON",e:"you",case:"nominative",num:"singular"},
  {k:"an",t:"PRON",e:"you",case:"accusative",num:"singular"},
  {k:"ai",t:"PRON",e:"your",case:"genitive",num:"singular"},
  {k:"au",t:"PRON",e:"with you",case:"instrumental",num:"singular"},
  {k:"is",t:"PRON",e:"he, she, it",case:"nominative",num:"singular"},
  {k:"in",t:"PRON",e:"him, her, it",case:"accusative",num:"singular"},
  {k:"si",t:"PRON",e:"his, her, its",case:"genitive",num:"singular"},
  {k:"yu",t:"PRON",e:"with him, with her, with it",case:"instrumental",num:"singular"},
  {k:"os",t:"PRON",e:"we",case:"nominative",num:"plural"},
  {k:"on",t:"PRON",e:"us",case:"accusative",num:"plural"},
  {k:"oi",t:"PRON",e:"our",case:"genitive",num:"plural"},
  {k:"su",t:"PRON",e:"with us",case:"instrumental",num:"plural"},
  {k:"ya",t:"PRON",e:"they",case:"nominative",num:"plural"},
  {k:"yan",t:"PRON",e:"them",case:"accusative",num:"plural"},
  {k:"yai",t:"PRON",e:"their",case:"genitive",num:"plural"},
  {k:"yau",t:"PRON",e:"with them",case:"instrumental",num:"plural"},
  {k:"ere",t:"PREP",e:"in, inside, within",base:"re"},
  {k:"re",t:"PREP",e:"in, inside, within",base:"re"},
  {k:"eme",t:"PREP",e:"from, out of",base:"me"},
  {k:"me",t:"PREP",e:"from, out of",base:"me"},
  {k:"eke",t:"PREP",e:"with, alongside",base:"ke"},
  {k:"ke",t:"PREP",e:"with, alongside",base:"ke"},
  {k:"myp",t:"NOUN",e:"Meep, The Light Incarnate",cls:"1st"},
  {k:"kas",t:"NOUN",e:"house, home, dwelling",cls:"1st"},
  {k:"path",t:"NOUN",e:"path, route, trail",cls:"1st"},
  {k:"varas",t:"NOUN",e:"city, settlement",cls:"2nd"},
  {k:"ebes",t:"NOUN",e:"tavern, inn, pub",cls:"2nd"},
  {k:"stass",t:"NOUN",e:"stone, rock",cls:"1st"},
  {k:"tar",t:"VERB",e:"be, is, are, am, exist"},
  {k:"melíl",t:"ADJ",e:"beautiful, gorgeous, pretty"},
  {k:"liral",t:"ADJ",e:"happy, joyful, glad"},
  {k:"brenár",t:"VERB",e:"eat, consume, dine"},
  {k:"sutár",t:"VERB",e:"to save, to guard, to protect"},
  {k:"subadár",t:"VERB",e:"speak, talk, converse"},
  {k:"narár",t:"VERB",e:"do, make, perform"},
  {k:"suvár",t:"VERB",e:"help, aid, assist"},
  {k:"audal",t:"VERB",e:"fall, descend, collapse, succumb"}
];

async function initializeDataLayer() {
  try {
    const res = await fetch('dictionary.json');
    if (!res.ok) throw new Error(`HTTP Violation: ${res.status}`);
    CORE_DICT = await res.json();
  } catch (err) {
    console.warn("Deploying embedded engine fallback array.");
    CORE_DICT = EMERGENCY_FALLBACK_DICT;
  }
  renderDict();
}

function findWordByEnglishPhrase(phrase, typeFilter = null) {
  let q = phrase.toLowerCase().trim();
  if (!q) return null;
  return CORE_DICT.find(x => {
    if (typeFilter && x.t !== typeFilter) return false;
    let def = x.e.toLowerCase().trim();
    if (def === q) return true;
    
    let options = def.split(/[,;\/]+|\bor\b/).map(o => o.trim());
    if (options.some(opt => opt === q || q === opt)) return true;
    
    let cleanQ = q.startsWith("to ") ? q.substring(3).trim() : q;
    let cleanOptions = options.map(opt => opt.startsWith("to ") ? opt.substring(3).trim() : opt);
    if (cleanOptions.some(opt => opt === cleanQ || cleanQ === opt)) return true;
    
    return false;
  });
}

function findWordByEnglish(token, typeFilter = null) {
  return findWordByEnglishPhrase(token, typeFilter);
}

function detectNounClass(w) {
  let clean = w.toLowerCase().trim();
  let found = CORE_DICT.find(x => x.k.toLowerCase() === clean && x.t === "NOUN");
  if (found && found.cls) return found.cls;
  let vowelGroups = clean.match(/[aeiouáéíóú]+/g) || [];
  if (vowelGroups.length <= 1) return "1st";
  if (!clean.endsWith('s')) return "1st";
  return "2nd";
}

function detectVocalicStem(w) {
  let clean = w.toLowerCase();
  if (clean.endsWith('s')) return clean.slice(-2, -1);
  return clean.slice(-1);
}

function inflectEnglishVerb(baseEnglish, time, aspect) {
  let cleaned = baseEnglish.replace(/\bto\s+/gi, '').replace(/,\s*/g, '/');

  const getForms = (v) => {
    v = v.trim();
    const irregulars = {
      "be":    { past: "was/were", ing: "being",    ppart: "been",   pres3sg: "is" },
      "exist": { past: "existed",  ing: "existing", ppart: "existed", pres3sg: "exists" },
      "eat":   { past: "ate",      ing: "eating",   ppart: "eaten" },
      "speak": { past: "spoke",    ing: "speaking", ppart: "spoken" },
      "do":    { past: "did",      ing: "doing",    ppart: "done" },
      "fall":  { past: "fell",     ing: "falling",  ppart: "fallen" }
    };
    const forms = irregulars[v] || {
      past: v.endsWith('e') ? v + "d" : v + "ed",
      ing: v.endsWith('e') ? v.slice(0, -1) + "ing" : v + "ing",
      ppart: v.endsWith('e') ? v + "d" : v + "ed"
    };
    // Default present 3sg: add -s, or -es for sibilant endings
    if (!forms.pres3sg) {
      forms.pres3sg = (v.endsWith('s') || v.endsWith('sh') || v.endsWith('ch') || v.endsWith('x') || v.endsWith('z'))
        ? v + "es" : v + "s";
    }
    return forms;
  };

  const parts = cleaned.split('/');
  
  if (time === "future") {
    if (aspect === "simple") return "will " + parts.join('/');
    if (aspect === "continuous") return "will be " + parts.map(p => getForms(p).ing).join('/');
    if (aspect === "perfect") return "will have " + parts.map(p => getForms(p).ppart).join('/');
  }
  if (time === "past") {
    if (aspect === "simple") return parts.map(p => getForms(p).past).join('/');
    if (aspect === "continuous") return "was/were " + parts.map(p => getForms(p).ing).join('/');
    if (aspect === "perfect") return "had " + parts.map(p => getForms(p).ppart).join('/');
  }
  if (time === "present") {
    if (aspect === "simple") return parts.map(p => getForms(p).pres3sg).join('/');
    if (aspect === "continuous") return "is/are " + parts.map(p => getForms(p).ing).join('/');
    if (aspect === "perfect") return "has/have " + parts.map(p => getForms(p).ppart).join('/');
  }
  return cleaned;
}

function analyzeWordMorphology(word, adjacentTokens = [], currentIndex = 0) {
  let cl = word.toLowerCase().trim().replace(/[,!?\.;:'"]/g, '');
  if (!cl) return null;

  let exactMatch = CORE_DICT.find(x => x.k.toLowerCase() === cl);
  if (exactMatch) {
    if (exactMatch.t === "PRON") {
      return { type: "pronoun", base: exactMatch.k, gloss: exactMatch.e, case: exactMatch.case || 'nominative', num: exactMatch.num || 'singular', meta: `Case: ${exactMatch.case || 'nominative'}\nNumber: ${exactMatch.num || 'singular'}` };
    }
    if (exactMatch.t === "PREP") {
      return { type: "preposition", base: exactMatch.base || exactMatch.k, gloss: exactMatch.e, meta: `Form: Direct\nConnected Case: accusative` };
    }
    if (exactMatch.t === "VERB") {
      return { type: "verb", base: exactMatch.k, gloss: exactMatch.e, time: "present", aspect: "simple", mode: "direct", meta: `Mode: direct\nAspect: simple\nTime: present (Root)` };
    }
    if (exactMatch.t === "ADJ") {
      return { type: "adjective", base: exactMatch.k, gloss: exactMatch.e, meta: `Case: nominative\nNumber: singular` };
    }
    if (exactMatch.t === "NOUN") {
      let cls = exactMatch.cls || detectNounClass(exactMatch.k);
      return { type: "noun", class: cls, base: exactMatch.k, gloss: exactMatch.e, case: "nominative", num: "singular", meta: `Class: ${cls}\nCase: nominative\nNumber: singular` };
    }
  }

  for (let x of CORE_DICT.filter(d => d.t === "VERB")) {
    let stem = x.k.replace(/ár$|ar$/, '');
    if (cl.startsWith(stem) && cl.length > stem.length) {
      let suffix = cl.substring(stem.length);
      let aspect = "simple", time = "present", mode = "direct";
      let validSuffix = true;

      if (suffix === "aróth" || suffix === "óth") { mode = "reflexive"; time = "past"; aspect = "simple"; }
      else if (suffix === "aráth" || suffix === "áth") { mode = "reflexive"; time = "present"; aspect = "simple"; }
      else if (suffix === "aríth" || suffix === "íth") { mode = "reflexive"; time = "future"; aspect = "simple"; }
      else if (suffix === "eróth") { mode = "reflexive"; time = "past"; aspect = "continuous"; }
      else if (suffix === "eráth") { mode = "reflexive"; time = "present"; aspect = "continuous"; }
      else if (suffix === "eríth") { mode = "reflexive"; time = "future"; aspect = "continuous"; }
      else if (suffix === "ayóth") { mode = "reflexive"; time = "past"; aspect = "perfect"; }
      else if (suffix === "ayáth") { mode = "reflexive"; time = "present"; aspect = "perfect"; }
      else if (suffix === "ayíth") { mode = "reflexive"; time = "future"; aspect = "perfect"; }
      else if (suffix === "ór" || suffix === "or") { mode = "direct"; time = "past"; aspect = "simple"; }
      else if (suffix === "ír" || suffix === "ir") { mode = "direct"; time = "future"; aspect = "simple"; }
      else if (suffix === "erá") { mode = "direct"; time = "present"; aspect = "continuous"; }
      else if (suffix === "eró") { mode = "direct"; time = "past"; aspect = "continuous"; }
      else if (suffix === "erí") { mode = "direct"; time = "future"; aspect = "continuous"; }
      else if (suffix === "ayá") { mode = "direct"; time = "present"; aspect = "perfect"; }
      else if (suffix === "ayó") { mode = "direct"; time = "past"; aspect = "perfect"; }
      else if (suffix === "ayí") { mode = "direct"; time = "future"; aspect = "perfect"; }
      else if (suffix === "ár" || suffix === "ar") { mode = "direct"; time = "present"; aspect = "simple"; }
      else { validSuffix = false; }

      if (validSuffix) {
        return {
          type: "verb", base: x.k, gloss: x.e,
          time: time, aspect: aspect, mode: mode,
          meta: `Mode: ${mode}\nAspect: ${aspect}\nTime: ${time}`
        };
      }
    }
  }

  for (let x of CORE_DICT.filter(d => d.t === "NOUN")) {
    let cls = detectNounClass(x.k);
    let r = x.k.toLowerCase();
    let endsInS = r.endsWith('s');
    let sRoot = endsInS ? r.slice(0, -1) : r;

    if (cls === "1st") {
      const ACCENT_MAP_M = { á:'a', é:'e', í:'i', ó:'o', ú:'u' };
      function stripAccentM(s) {
        return s.split('').reverse().join('').replace(/[áéíóú]/, c => ACCENT_MAP_M[c]).split('').reverse().join('');
      }
      const VOWELS_M = "aeiouáéíóú";
      let consonantFinal = r.length > 0 && !endsInS && !VOWELS_M.includes(r[r.length - 1]);
      let finalCons = consonantFinal ? r[r.length - 1] : '';
      let stripped = consonantFinal ? stripAccentM(r) : r;

      // Nominative plural
      if (endsInS && cl === sRoot + "ssa") return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "nominative", num: "plural", meta: "Class: 1st\nCase: nominative\nNumber: plural" };
      if (consonantFinal && (cl === r + finalCons + "a" || cl === stripped + "á")) return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "nominative", num: "plural", meta: "Class: 1st\nCase: nominative\nNumber: plural" };
      if (!endsInS && !consonantFinal && cl === r + "a") return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "nominative", num: "plural", meta: "Class: 1st\nCase: nominative\nNumber: plural" };

      // Accusative singular
      if (endsInS && (cl === sRoot + "sse" || cl === sRoot + "sé")) return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "accusative", num: "singular", meta: "Class: 1st\nCase: accusative\nNumber: singular" };
      if (consonantFinal && (cl === r + finalCons + "e" || cl === stripped + "é")) return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "accusative", num: "singular", meta: "Class: 1st\nCase: accusative\nNumber: singular" };
      if (!endsInS && !consonantFinal && (cl === r + "e" || cl === r + "é")) return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "accusative", num: "singular", meta: "Class: 1st\nCase: accusative\nNumber: singular" };

      // Accusative plural
      if (endsInS && cl === sRoot + "ssé") return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "accusative", num: "plural", meta: "Class: 1st\nCase: accusative\nNumber: plural" };
      if (cl === stripped + "éa" || cl === r + "éa") return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "accusative", num: "plural", meta: "Class: 1st\nCase: accusative\nNumber: plural" };

      // Genitive
      if (cl === r + "i")                return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "genitive",      num: "singular", meta: "Class: 1st\nCase: genitive\nNumber: singular" };
      if (cl === stripped + "ía" || cl === r + "ía") return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "genitive",      num: "plural",   meta: "Class: 1st\nCase: genitive\nNumber: plural" };

      // Instrumental
      if (cl === r + "u")                return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "instrumental",  num: "singular", meta: "Class: 1st\nCase: instrumental\nNumber: singular" };
      if (cl === stripped + "úa" || cl === r + "úa") return { type: "noun", class: "1st", base: x.k, gloss: x.e, case: "instrumental",  num: "plural",   meta: "Class: 1st\nCase: instrumental\nNumber: plural" };
    } else {
      let stemVowel = detectVocalicStem(x.k);
      let pureStem = x.k.endsWith('s') ? r.slice(0, -1) : r;

      if (cl === pureStem + "a" || cl === pureStem + "sa") return { type: "noun", class: "2nd", stem: stemVowel, base: x.k, gloss: x.e, case: "nominative", num: "plural", meta: `Class: 2nd\nStem: ${stemVowel}\nCase: nominative\nNumber: plural` };
      if (cl === pureStem) return { type: "noun", class: "2nd", stem: stemVowel, base: x.k, gloss: x.e, case: "accusative", num: "singular", meta: `Class: 2nd\nStem: ${stemVowel}\nCase: accusative\nNumber: singular` };
      if (cl === pureStem + stemVowel + "n" || cl === pureStem + "n") return { type: "noun", class: "2nd", stem: stemVowel, base: x.k, gloss: x.e, case: "accusative", num: "plural", meta: `Class: 2nd\nStem: ${stemVowel}\nCase: accusative\nNumber: plural` };
      if (cl === pureStem + "i") return { type: "noun", class: "2nd", stem: stemVowel, base: x.k, gloss: x.e, case: "genitive", num: "singular", meta: `Class: 2nd\nStem: ${stemVowel}\nCase: genitive\nNumber: singular` };
      if (cl === pureStem + "ya") return { type: "noun", class: "2nd", stem: stemVowel, base: x.k, gloss: x.e, case: "genitive", num: "plural", meta: `Class: 2nd\nStem: ${stemVowel}\nCase: genitive\nNumber: plural` };
      if (cl === pureStem + "u") return { type: "noun", class: "2nd", stem: stemVowel, base: x.k, gloss: x.e, case: "instrumental", num: "singular", meta: `Class: 2nd\nStem: ${stemVowel}\nCase: instrumental\nNumber: singular` };
      if (cl === pureStem + "wa") return { type: "noun", class: "2nd", stem: stemVowel, base: x.k, gloss: x.e, case: "instrumental", num: "plural", meta: `Class: 2nd\nStem: ${stemVowel}\nCase: instrumental\nNumber: plural` };
    }
  }

  for (let x of CORE_DICT.filter(d => d.t === "ADJ")) {
    let baseStem = x.k.slice(0, -2);
    if (cl === x.k || (cl.startsWith(baseStem) && (cl.endsWith("íl") || cl.endsWith("ál")))) {
      let stemChar = x.k.endsWith("íl") ? "i" : "a";
      return { type: "adjective", base: x.k, gloss: x.e, meta: `Ending Stem: ${stemChar}\nCase: variant\nNumber: variant` };
    }
  }
  return null;
}

function doTranslate() {
  const dir = document.querySelector('input[name=direction]:checked').value;
  const input = document.getElementById('translate-input').value.trim();
  const box = document.getElementById('translate-result');
  if (!input) return;
  box.style.display = "block";

  if (dir === "kes-eng") {
    let tokens = input.split(/\s+/);
    let analyzedTokens = [];
    let literalGlosser = [];

    tokens.forEach((tok, i) => {
      let res = analyzeWordMorphology(tok, tokens, i);
      if (res) {
        analyzedTokens.push(res);
        literalGlosser.push(res.gloss.replace(/,\s*/g, ' / '));
      } else {
        analyzedTokens.push({ type: "unknown", gloss: tok, base: tok });
        literalGlosser.push(`[${tok}]`);
      }
    });

    let subjs = [], objs = [], vbs = [], others = [];
    analyzedTokens.forEach(t => {
      if (t.type === "verb") vbs.push(t);
      else if (t.type === "pronoun" || t.type === "noun") {
        if (t.case === "accusative" || t.case === "instrumental") objs.push(t);
        else subjs.push(t);
      } else if (t.type !== "unknown") others.push(t);
    });

    let fluidTranslation = "";
    if (vbs.length > 0) {
      let subjStr = subjs.map(s => s.gloss.replace(/,\s*/g, ' / ')).join(" ") || "It";
      let objStr = objs.map(o => o.gloss.replace(/,\s*/g, ' / ')).join(" ");
      let verbNode = vbs[0];
      let inflectedVerb = inflectEnglishVerb(verbNode.gloss, verbNode.time || "present", verbNode.aspect || "simple");
      
      fluidTranslation = subjStr + " " + inflectedVerb + (objStr ? " " + objStr : "");
      if (others.length > 0) fluidTranslation += " " + others.map(o => o.gloss.replace(/,\s*/g, ' / ')).join(" ");
      fluidTranslation = fluidTranslation.trim();
      fluidTranslation = fluidTranslation.charAt(0).toUpperCase() + fluidTranslation.slice(1) + ".";
    } else {
      fluidTranslation = literalGlosser.join(" ");
    }

    box.innerHTML = `
      <p><strong>Structural Word Gloss:</strong> <span style="color:var(--text-dim); font-style:italic;">${literalGlosser.join(" ")}</span></p>
      <p style="margin-top:0.5rem;"><strong>Fluid Synthesized Translation:</strong> <span style="color:var(--green-light); font-weight:600;">${fluidTranslation}</span></p>
    `;
  } else {
    let words = input.toLowerCase().replace(/[,!?\.;:'"]/g, '').split(/\s+/);
    let outputComponents = [];
    let i = 0;
    
    let hasVerb = false;
    let clauseTime = "present";
    let clauseAspect = "simple";
    let clauseReflexive = false;

    while (i < words.length) {
      let token = words[i];

      let matchedEntry = null;
      let matchLength = 0;
      let isEnglishPlural = false;

      for (let len = Math.min(5, words.length - i); len >= 1; len--) {
        let subPhrase = words.slice(i, i + len).join(" ");
        let normalizedPhrase = subPhrase.replace(/\s+\/\s+/g, "/");
        let found = findWordByEnglishPhrase(subPhrase) || findWordByEnglishPhrase(normalizedPhrase);
        if (found) {
          matchedEntry = found;
          matchLength = len;
          break;
        }
      }

      // If no match, try stripping English plural suffixes from the last word
      if (!matchedEntry && token.length > 2) {
        let singularCandidates = [];
        if (token.endsWith("ies"))       singularCandidates.push(token.slice(0, -3) + "y"); // cities→city
        else if (token.endsWith("ves"))  singularCandidates.push(token.slice(0, -3) + "f"); // leaves→leaf
        else if (token.endsWith("es"))   singularCandidates.push(token.slice(0, -2));        // houses→house
        if (token.endsWith("s"))         singularCandidates.push(token.slice(0, -1));        // barons→baron

        for (let singular of singularCandidates) {
          let found = findWordByEnglishPhrase(singular) || findWordByEnglishPhrase(
            words.slice(i, i + 1).map((w, j) => j === 0 ? singular : w).join(" ")
          );
          if (found && (found.t === "NOUN" || found.t === "NAME")) {
            matchedEntry = found;
            matchLength = 1;
            isEnglishPlural = true;
            break;
          }
        }
      }

      let isVerbChain = false;
      let verbToken = "";
      let skipCount = 0;

      if (token === "will" && words[i+1] === "have" && words[i+2]) {
        clauseTime = "future"; clauseAspect = "perfect"; verbToken = words[i+2]; skipCount = 3; isVerbChain = true;
      } else if (token === "will" && words[i+1] === "be" && words[i+2]) {
        clauseTime = "future"; clauseAspect = "continuous"; verbToken = words[i+2]; skipCount = 3; isVerbChain = true;
      } else if (token === "will" && words[i+1]) {
        clauseTime = "future"; clauseAspect = "simple"; verbToken = words[i+1]; skipCount = 2; isVerbChain = true;
      } else if ((token === "have" || token === "has") && words[i+1]) {
        clauseTime = "present"; clauseAspect = "perfect"; verbToken = words[i+1]; skipCount = 2; isVerbChain = true;
      } else if (token === "had" && words[i+1]) {
        clauseTime = "past"; clauseAspect = "perfect"; verbToken = words[i+1]; skipCount = 2; isVerbChain = true;
      } else if ((token === "am" || token === "is" || token === "are") && words[i+1]) {
        // Only treat as continuous aux if next word is actually a present participle (-ing)
        if (words[i+1].endsWith("ing")) {
          clauseTime = "present"; clauseAspect = "continuous"; verbToken = words[i+1]; skipCount = 2; isVerbChain = true;
        } else {
          // Standalone copula — translate as tar (present simple)
          hasVerb = true;
          outputComponents.push({ type: "verb", word: "tar" });
          i++;
          continue;
        }
      } else if ((token === "was" || token === "were") && words[i+1]) {
        // Only treat as continuous aux if next word is actually a present participle (-ing)
        if (words[i+1].endsWith("ing")) {
          clauseTime = "past"; clauseAspect = "continuous"; verbToken = words[i+1]; skipCount = 2; isVerbChain = true;
        } else {
          // Standalone copula past — translate as tarór
          hasVerb = true;
          outputComponents.push({ type: "verb", word: "tarór" });
          i++;
          continue;
        }
      }

      if (isVerbChain) {
        let nextIdx = i + skipCount;
        if (nextIdx < words.length && ["myself", "yourself", "himself", "herself", "itself", "ourselves", "themselves"].includes(words[nextIdx])) {
          clauseReflexive = true; skipCount++;
        }
        let baseVerb = findWordByEnglishPhrase(verbToken, "VERB");
        if (baseVerb) {
          hasVerb = true;
          let stem = baseVerb.k.replace(/ár$|ar$/, '');
          let suffix = "";
          if (clauseAspect === "simple") {
            if (clauseTime === "present") suffix = clauseReflexive ? "aráth" : "ár";
            else if (clauseTime === "past") suffix = clauseReflexive ? "aróth" : "ór";
            else if (clauseTime === "future") suffix = clauseReflexive ? "aríth" : "ír";
          } else if (clauseAspect === "continuous") {
            if (clauseTime === "present") suffix = clauseReflexive ? "eráth" : "erá";
            else if (clauseTime === "past") suffix = clauseReflexive ? "eróth" : "eró";
            else if (clauseTime === "future") suffix = clauseReflexive ? "eríth" : "erí";
          } else if (clauseAspect === "perfect") {
            if (clauseTime === "present") suffix = clauseReflexive ? "ayáth" : "ayá";
            else if (clauseTime === "past") suffix = clauseReflexive ? "ayóth" : "ayó";
            else if (clauseTime === "future") suffix = clauseReflexive ? "ayíth" : "ayí";
          }
          outputComponents.push({ type: "verb", word: stem + suffix });
          i += skipCount;
          continue;
        }
      }

      if (matchedEntry) {
        let role = hasVerb ? "object" : "subject";
        if (matchedEntry.t === "PRON") {
          let finalPron = matchedEntry.k;
          if (role === "object") {
            let accForm = CORE_DICT.find(x => x.t === "PRON" && x.e.toLowerCase() === matchedEntry.e.toLowerCase() && x.case === "accusative");
            if (accForm) finalPron = accForm.k;
          }
          outputComponents.push({ type: "pronoun", role: role, word: finalPron });
        } else if (matchedEntry.t === "NOUN" || matchedEntry.t === "NAME") {
          let isPlural = isEnglishPlural || (words[i + matchLength - 1].endsWith('s') && !matchedEntry.e.toLowerCase().includes(words[i + matchLength - 1]));
          let cls = detectNounClass(matchedEntry.k);
          let inflected = matchedEntry.k;
          let targetCase = role === "object" ? "accusative" : "nominative";

          if (cls === "1st") {
            let r = matchedEntry.k;
            let endsInS = r.toLowerCase().endsWith('s');
            let sRoot = endsInS ? r.slice(0, -1) : r;
            if (targetCase === "accusative") {
              if (isPlural) inflected = `${r}éa`;
              else inflected = endsInS ? `${sRoot}sse` : `${r}e`;
            } else {
              if (isPlural) inflected = endsInS ? `${sRoot}ssa` : `${r}a`;
            }
          } else {
            let stem = detectVocalicStem(matchedEntry.k);
            let base = matchedEntry.k.endsWith('s') ? matchedEntry.k.slice(0, -1) : matchedEntry.k;
            if (targetCase === "accusative") {
              if (isPlural) inflected = base + stem + "n";
              else inflected = base;
            } else {
              if (isPlural) inflected = base + "a / " + base + "sa";
            }
          }
          outputComponents.push({ type: matchedEntry.t.toLowerCase(), role: role, word: inflected });
        } else if (matchedEntry.t === "VERB") {
          hasVerb = true;
          let stem = matchedEntry.k.replace(/ár$|ar$/, '');
          let isPast = token.endsWith("ed") || ["ate", "spoke", "did", "fell"].includes(token);
          let suffix = isPast ? "ór" : "ár";
          outputComponents.push({ type: "verb", word: stem + suffix });
        } else if (matchedEntry.t === "ADJ") {
          // Determine plural adjective form using same rules as noun consonant-doubling
          const ACCENT_MAP_ADJ = { á:'a', é:'e', í:'i', ó:'o', ú:'u' };
          function stripAdjAccent(s) {
            return s.split('').reverse().join('').replace(/[áéíóú]/, c => ACCENT_MAP_ADJ[c]).split('').reverse().join('');
          }
          const ADJ_VOWELS = "aeiouáéíóú";
          let adjBase = matchedEntry.k;
          let adjPlural;
          let subjectIsPlural = words.some((w, wi) => {
            // Check if any noun/subject word looks plural (ends in s, not an aux verb)
            return w.endsWith('s') && !["is","was","has","does","goes"].includes(w);
          });
          if (subjectIsPlural && !ADJ_VOWELS.includes(adjBase[adjBase.length - 1])) {
            // Consonant-final adjective plural: double final consonant + a / strip accent + á
            let finalCons = adjBase[adjBase.length - 1];
            let stripped = stripAdjAccent(adjBase);
            adjPlural = `${adjBase}${finalCons}a / ${stripped}á`;
          } else if (subjectIsPlural) {
            // Vowel-final adjective plural
            adjPlural = adjBase + "a";
          } else {
            adjPlural = adjBase;
          }
          outputComponents.push({ type: "adjective", word: subjectIsPlural ? adjPlural : adjBase });
        } else {
          outputComponents.push({ type: "other", word: matchedEntry.k });
        }
        i += matchLength;
        continue;
      }

      if (token === "the" || token === "a" || token === "an") { i++; continue; }
      if (token !== "/") outputComponents.push({ type: "unknown", word: `[${token}]` });
      i++;
    }

    let finalOrder = [];
    let subjs = outputComponents.filter(c => c.role === "subject");
    let objs = outputComponents.filter(c => c.role === "object");
    let vbs = outputComponents.filter(c => c.type === "verb");
    let adjs = outputComponents.filter(c => c.type === "adjective");
    let others = outputComponents.filter(c => !c.role && c.type !== "verb" && c.type !== "adjective");

    if (subjs.length > 0 || objs.length > 0 || vbs.length > 0) {
      subjs.forEach(s => finalOrder.push(s.word));
      objs.forEach(o => finalOrder.push(o.word));
      adjs.forEach(a => finalOrder.push(a.word));
      others.forEach(oth => finalOrder.push(oth.word));
      vbs.forEach(v => finalOrder.push(v.word));
    } else {
      outputComponents.forEach(c => finalOrder.push(c.word));
    }

    let translationText = finalOrder.join(" ");
    if (translationText) {
      translationText = translationText.charAt(0).toUpperCase() + translationText.slice(1) + ".";
    }

    box.innerHTML = `
      <p><strong>Synthesized Kestelál Text:</strong> <span style="color:var(--green-light); font-weight:600;">${translationText || 'No translatable tokens parsed.'}</span></p>
    `;
  }
}

function doGloss() {
  const input = document.getElementById('gloss-input').value.trim();
  const box = document.getElementById('gloss-result');
  if (!input) return;
  box.style.display = "block";

  let tokens = input.split(/\s+/);
  let html = '<div class="gloss-row">';

  tokens.forEach((tok, i) => {
    let res = analyzeWordMorphology(tok, tokens, i);
    if (res) {
      html += `
        <div class="gloss-word">
          <div class="gloss-source">${tok}</div>
          <div class="gloss-target">${res.gloss}</div>
          <div class="gloss-details">${res.meta}</div>
        </div>
      `;
    } else {
      html += `
        <div class="gloss-word">
          <div class="gloss-source">${tok}</div>
          <div class="gloss-target">[Unknown Token]</div>
          <div class="gloss-details">Type: unmapped\nNo valid morphosyntactic rule matched.</div>
        </div>
      `;
    }
  });

  html += '</div>';
  box.innerHTML = html;
}

function doDeclension() {
  const w = document.getElementById('decl-word').value.trim();
  const box = document.getElementById('decl-result');
  if (!w) return;

  let cls = detectNounClass(w);
  let r = w.toLowerCase();
  let endsInS = r.endsWith('s');
  let sRoot = endsInS ? r.slice(0, -1) : r;

  // Strip the last accented vowel in the stem (used when the suffix carries its own accent)
  const ACCENT_MAP = { á:'a', é:'e', í:'i', ó:'o', ú:'u' };
  function stripStemAccent(stem) {
    // Reverse, replace the first accented vowel found, reverse back
    return stem.split('').reverse().join('')
      .replace(/[áéíóú]/, c => ACCENT_MAP[c])
      .split('').reverse().join('');
  }

  // Check if the word ends in a consonant (for consonant-doubling rule)
  const VOWELS = "aeiouáéíóú";
  function endsInConsonant(s) {
    return s.length > 0 && !VOWELS.includes(s[s.length - 1]);
  }

  let nomSing, nomPlur, accSing, accPlur, genSing, genPlur, insSing, insPlur;

  if (cls === "1st") {
    nomSing = w;

    if (endsInS) {
      // Words ending in -s: double the s → -ssa / accented variant -sá (strip stem accent)
      nomPlur = sRoot + "ssa";
      accSing = `${sRoot}sse / ${stripStemAccent(sRoot)}sé`;
      accPlur = stripStemAccent(r) + "éa";
      genSing = r + "i";
      genPlur = stripStemAccent(r) + "ía";
      insSing = r + "u";
      insPlur = stripStemAccent(r) + "úa";
    } else if (endsInConsonant(r)) {
      // Words ending in a consonant: double final consonant + vowel / OR strip accent + accented suffix vowel
      let finalCons = r[r.length - 1];
      let stripped = stripStemAccent(r);
      nomPlur = `${r}${finalCons}a / ${stripped}á`;
      accSing = `${r}${finalCons}e / ${stripped}é`;
      accPlur = stripped + "éa";
      genSing = r + "i";
      genPlur = stripped + "ía";
      insSing = r + "u";
      insPlur = stripped + "úa";
    } else {
      // Words ending in a vowel: plain suffix append
      nomPlur = r + "a";
      accSing = `${r}e / ${r}é`;
      accPlur = r + "éa";
      genSing = r + "i";
      genPlur = r + "ía";
      insSing = r + "u";
      insPlur = r + "úa";
    }
  } else {
    let stem = detectVocalicStem(w);
    let base = endsInS ? r.slice(0, -1) : r;
    nomSing = w;
    nomPlur = base + "a / " + base + "sa";
    accSing = base;
    accPlur = base + stem + "n";
    genSing = base + "i";
    genPlur = base + "ya";
    insSing = base + "u";
    insPlur = base + "wa";
  }

  box.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Case</th>
          <th>Singular</th>
          <th>Plural</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="td-kas">Nominative</td>
          <td>${nomSing}</td>
          <td>${nomPlur}</td>
        </tr>
        <tr>
          <td class="td-kas">Accusative</td>
          <td>${accSing}</td>
          <td>${accPlur}</td>
        </tr>
        <tr>
          <td class="td-kas">Genitive</td>
          <td>${genSing}</td>
          <td>${genPlur}</td>
        </tr>
        <tr>
          <td class="td-kas">Instrumental</td>
          <td>${insSing}</td>
          <td>${insPlur}</td>
        </tr>
      </tbody>
    </table>
  `;
}

function doConjugate() {
  const v = document.getElementById('verb-input').value.trim();
  const box = document.getElementById('verb-result');
  if (!v) return;

  let stem = v.replace(/ár$|ar$/, '');

  box.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Aspect / Mode</th>
          <th>Past</th>
          <th>Present</th>
          <th>Future</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="td-kas">Simple Direct</td>
          <td>${stem}ór</td>

        </tr>
        <tr>
          <td class="td-kas">Continuous Direct</td>
          <td>${stem}eró</td>
          <td>${stem}erá</td>

        </tr>
        <tr>
          <td class="td-kas">Perfect Direct</td>
          <td>${stem}ayó</td>
          <td>${stem}ayá</td>
          <td>${stem}ayí</td>
        </tr>
        <tr>
          <td class="td-kas">Simple Reflexive</td>
          <td>${stem}aróth</td>
          <td>${stem}aráth</td>
          <td>${stem}aríth</td>
        </tr>
        <tr>
          <td class="td-kas">Continuous Reflexive</td>

        </tr>

      </tbody>
    </table>
  `;
}

function renderDict() {
  const query = document.getElementById('dict-search').value.toLowerCase().trim();
  const listEl = document.getElementById('dict-list');
  if (!listEl) return;

  let filtered = CORE_DICT;
  if (query) {
    filtered = CORE_DICT.filter(x => 
      x.k.toLowerCase().includes(query) || 
      x.e.toLowerCase().includes(query) || 
      x.t.toLowerCase().includes(query)
    );
  }

  const totalCounterEl = document.getElementById('total-counter');
  if (totalCounterEl) totalCounterEl.textContent = filtered.length;

  if (filtered.length === 0) {
    listEl.innerHTML = '<p style="color:var(--text-muted); font-style:italic; padding: 0.5rem 0;">No index items match search coordinates.</p>';
    return;
  }

  listEl.innerHTML = filtered.map(x => `
    <div class="dict-entry">
      <div class="de-word">${x.k}</div>
      <div class="de-type">${x.t}</div>
      <div style="color:var(--ink)">${x.e}${x.cls ? ` <span style="color:var(--text-dim); font-size:0.85rem; font-style:italic;">(${x.cls} Class)</span>` : ''}</div>
    </div>
  `).join('');
}

// Interactive Multi-Panel Switching System
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    
    btn.classList.add('active');
    const panelId = 'tab-' + btn.getAttribute('data-tab');
    document.getElementById(panelId).classList.add('active');
  });
});

// Live Index Input Hooks
document.getElementById('dict-search').addEventListener('input', renderDict);

// Document Lifecycle Setup Hook
document.addEventListener('DOMContentLoaded', () => {
  initializeDataLayer();
});
</script>
