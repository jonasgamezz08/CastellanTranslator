<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kestelál — Castellan Language Workbench</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f07;
  --bg2: #111a0a;
  --bg3: #162010;
  --bg4: #1d2b15;
  --green-deep: #1a3a12;
  --green-mid: #2d5a1e;
  --green-bright: #4a8a30;
  --green-glow: #6db84a;
  --green-light: #9ed97a;
  --green-pale: #c8edae;
  --amber: #c8922a;
  --amber-light: #e8b840;
  --text: #d4e8b8;
  --text-dim: #7a9960;
  --text-muted: #4a6335;
  --border: #2a4020;
  --border-glow: #3a5a28;
  --ink: #e8f5d0;
  --shadow: rgba(0,0,0,0.6);
  --radius: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(74,138,48,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(26,58,18,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 2.5rem 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(10,15,7,0.95) 0%, transparent 100%);
}

.title-rune {
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--text-muted);
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 0.6rem;
}

h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 700;
  color: var(--green-light);
  letter-spacing: 0.08em;
  line-height: 1.1;
  text-shadow: 0 0 40px rgba(109,184,74,0.3);
}

.subtitle {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1.05rem;
  color: var(--text-dim);
  margin-top: 0.4rem;
}

nav {
  position: relative;
  z-index: 10;
  display: flex;
  gap: 0;
  padding: 0 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  overflow-x: auto;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 0.85rem 1.3rem;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.2s, border-color 0.2s;
}
nav .tab-btn:hover { color: var(--text-dim); }
nav .tab-btn.active {
  color: var(--green-glow);
  border-bottom-color: var(--green-glow);
}

main {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem 1rem 4rem;
}

.panel { display: none; }
.panel.active { display: block; }

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

.card-title {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.card-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

textarea, input[type=text], select {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--ink);
  font-family: 'EB Garamond', serif;
  font-size: 1rem;
  padding: 0.6rem 0.8rem;
  width: 100%;
}

.btn {
  background: var(--green-deep);
  border: 1px solid var(--green-mid);
  border-radius: var(--radius);
  color: var(--green-pale);
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 0.06em;
  padding: 0.55rem 1.3rem;
  cursor: pointer;
}
.btn:hover { background: var(--green-mid); border-color: var(--green-bright); }

.result-box {
  background: var(--bg3);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius);
  padding: 1.1rem 1.3rem;
  margin-top: 1rem;
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--ink);
}

.direction-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
}

.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
  margin-top: 0.8rem;
}
th {
  background: var(--bg3);
  color: var(--green-bright);
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.5rem 0.7rem;
  border: 1px solid var(--border);
}
td {
  padding: 0.45rem 0.7rem;
  border: 1px solid var(--border);
  color: var(--text);
}
.td-kas { color: var(--green-glow); font-family: 'Cinzel', serif; font-weight: 600; }

.dict-entry {
  border-bottom: 1px solid var(--border);
  padding: 0.7rem 0;
  display: grid;
  grid-template-columns: 240px 80px 1fr;
  gap: 0.5rem 1rem;
  align-items: baseline;
}
.de-word { font-family: 'Cinzel', serif; color: var(--green-glow); }
.de-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--amber);
  background: rgba(200,146,42,0.1);
  padding: 1px 5px;
  border-radius: 3px;
  text-align: center;
}

.gloss-row { display: flex; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 1rem; }
.gloss-word {
  display: flex;
  flex-direction: column;
  background: rgba(255,255,255,0.02);
  padding: 0.75rem 1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  flex: 1;
  min-width: 260px;
}
.gloss-source { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--green-light); margin-bottom: 0.2rem; }
.gloss-target { color: var(--ink); font-size: 1rem; font-weight: 500; }
.gloss-details { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--amber-light); margin-top: 0.4rem; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 3px; border-left: 3px solid var(--amber); white-space: pre-line; }

#notif {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  background: var(--bg3);
  border: 1px solid var(--green-mid);
  border-radius: var(--radius);
  padding: 0.7rem 1.2rem;
  font-size: 0.88rem;
  color: var(--green-pale);
  z-index: 9999;
  transform: translateY(80px);
  opacity: 0;
  transition: transform 0.3s, opacity 0.3s;
}
#notif.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div id="notif"></div>

<header>
  <div class="title-rune">᛭ Kodikus Gramátai ᛭</div>
  <h1>Kestelál</h1>
  <div class="subtitle">Branching Morphosyntactic Classification Engine</div>
</header>

<nav>
  <button class="tab-btn active" data-tab="translate">Translate</button>
  <button class="tab-btn" data-tab="gloss">Glossing & Analysis</button>
  <button class="tab-btn" data-tab="grammar">Grammar & Conjugation</button>
  <button class="tab-btn" data-tab="dictionary">Dictionary</button>
</nav>

<main>

<div id="tab-translate" class="panel active">
  <div class="card">
    <div class="card-title">Direction of Translation</div>
    <div class="direction-row">
      <label><input type="radio" name="direction" value="kes-eng" checked> Kestelál → English</label>
      <label><input type="radio" name="direction" value="eng-kes"> English → Kestelál</label>
    </div>
    <textarea id="translate-input" placeholder="Enter text... (Try: 'Myp on sutír' or 'Fazen is great')"></textarea>
    <button class="btn" style="margin-top:0.7rem" onclick="doTranslate()">Translate</button>
    <div id="translate-result" class="result-box" style="display:none"></div>
  </div>
</div>

<div id="tab-gloss" class="panel">
  <div class="card">
    <div class="card-title">Advanced Morphological Analyzer</div>
    <input type="text" id="gloss-input" placeholder="Enter words (e.g. Myp on sutír)">
    <button class="btn" style="margin-top:0.7rem" onclick="doGloss()">Analyse Word Morphology</button>
    <div id="gloss-result" class="result-box" style="display:none"></div>
  </div>
</div>

<div id="tab-grammar" class="panel">
  <div class="card">
    <div class="card-title">Noun Paradigms</div>
    <div class="grid-2">
      <input type="text" id="decl-word" placeholder="Nominative form (e.g. kas, path, varas, myp)">
      <button class="btn" onclick="doDeclension()">Decline Noun</button>
    </div>
    <div id="decl-result"></div>
  </div>

  <div class="card">
    <div class="card-title">Verb Systems</div>
    <div class="grid-2">
      <input type="text" id="verb-input" placeholder="Infinitive (e.g. brenár, sutár, tar)">
      <button class="btn" onclick="doConjugate()">Generate Verb Matrix</button>
    </div>
    <div id="verb-result"></div>
  </div>
</div>

<div id="tab-dictionary" class="panel">
  <div class="card">
    <div class="card-title">Active Lexicon Index Search</div>
    <input type="text" id="dict-search" placeholder="Type here to search words...">
    <div id="dict-list" style="margin-top:1rem; max-height:400px; overflow-y:auto;"></div>
  </div>
</div>

</main>

<script>
let CORE_DICT = [];

const EMERGENCY_FALLBACK_DICT = [
  {k:"es",t:"PRON",e:"I",case:"nominative",num:"singular"},
  {k:"en",t:"PRON",e:"me",case:"accusative",num:"singular"},
  {k:"ei",t:"PRON",e:"my",case:"genitive",num:"singular"},
  {k:"eu",t:"PRON",e:"with me",case:"instrumental",num:"singular"},
  {k:"as",t:"PRON",e:"you",case:"nominative",num:"singular"},
  {k:"an",t:"PRON",e:"you",case:"accusative",num:"singular"},
  {k:"ai",t:"PRON",e:"your",case:"genitive",num:"singular"},
  {k:"au",t:"PRON",e:"with you",case:"instrumental",num:"singular"},
  {k:"is",t:"PRON",e:"he, she, it",case:"nominative",num:"singular"},
  {k:"in",t:"PRON",e:"him, her, it",case:"accusative",num:"singular"},
  {k:"si",t:"PRON",e:"his, her, its",case:"genitive",num:"singular"},
  {k:"yu",t:"PRON",e:"with him, with her, with it",case:"instrumental",num:"singular"},
  {k:"os",t:"PRON",e:"we",case:"nominative",num:"plural"},
  {k:"on",t:"PRON",e:"us",case:"accusative",num:"plural"},
  {k:"oi",t:"PRON",e:"our",case:"genitive",num:"plural"},
  {k:"su",t:"PRON",e:"with us",case:"instrumental",num:"plural"},
  {k:"ya",t:"PRON",e:"they",case:"nominative",num:"plural"},
  {k:"yan",t:"PRON",e:"them",case:"accusative",num:"plural"},
  {k:"yai",t:"PRON",e:"their",case:"genitive",num:"plural"},
  {k:"yau",t:"PRON",e:"with them",case:"instrumental",num:"plural"},
  {k:"ere",t:"PREP",e:"in, inside, within",base:"re"},
  {k:"re",t:"PREP",e:"in, inside, within",base:"re"},
  {k:"eme",t:"PREP",e:"from, out of",base:"me"},
  {k:"me",t:"PREP",e:"from, out of",base:"me"},
  {k:"eke",t:"PREP",e:"with, alongside",base:"ke"},
  {k:"ke",t:"PREP",e:"with, alongside",base:"ke"},
  {k:"myp",t:"NOUN",e:"Meep, The Light Incarnate",cls:"1st"},
  {k:"kas",t:"NOUN",e:"house, home, dwelling",cls:"1st"},
  {k:"path",t:"NOUN",e:"path, route, trail",cls:"1st"},
  {k:"varas",t:"NOUN",e:"city, settlement",cls:"2nd"},
  {k:"ebes",t:"NOUN",e:"tavern, inn, pub",cls:"2nd"},
  {k:"stass",t:"NOUN",e:"stone, rock",cls:"1st"},
  {k:"melíl",t:"ADJ",e:"beautiful, gorgeous, pretty"},
  {k:"liral",t:"ADJ",e:"happy, joyful, glad"},
  {k:"brenár",t:"VERB",e:"eat, consume, dine"},
  {k:"sutár",t:"VERB",e:"to save, to guard, to protect"},
  {k:"subadár",t:"VERB",e:"speak, talk, converse"},
  {k:"narár",t:"VERB",e:"do, make, perform"},
  {k:"suvár",t:"VERB",e:"help, aid, assist"},
  {k:"audal",t:"VERB",e:"fall, descend, collapse, succumb"},
  {k:"tar",t:"VERB",e:"be, exist, to be, to exist"}
];

async function initializeDataLayer() {
  try {
    const res = await fetch('dictionary.json');
    if (!res.ok) throw new Error(`HTTP Violation: ${res.status}`);
    CORE_DICT = await res.json();
  } catch (err) {
    console.warn("Deploying embedded engine fallback array.");
    CORE_DICT = EMERGENCY_FALLBACK_DICT;
  }
  renderDict();
}

function getEnglishVerbBase(v) {
  v = v.toLowerCase().trim();
  const irregularsInverse = {
    "was": "be", "were": "be", "been": "be", "being": "be", "is": "be", "am": "be", "are": "be",
    "ate": "eat", "eating": "eat", "eaten": "eat", "eats": "eat",
    "spoke": "speak", "speaking": "speak", "spoken": "speak", "speaks": "speak",
    "did": "do", "doing": "do", "done": "do", "does": "do",
    "fell": "fall", "falling": "fall", "fallen": "fall", "falls": "fall",
    "talked": "talk", "talking": "talk", "talks": "talk",
    "saved": "save", "saving": "save", "saves": "save",
    "guarded": "guard", "guarding": "guard", "guards": "guard",
    "protected": "protect", "protecting": "protect", "protects": "protect",
    "conversed": "converse", "conversing": "converse", "converses": "converse",
    "helped": "help", "helping": "help", "helps": "help",
    "consumed": "consume", "consuming": "consume", "consumes": "consume",
    "dined": "dine", "dining": "dine", "dines": "dine"
  };
  if (irregularsInverse[v]) return irregularsInverse[v];
  if (v.endsWith("ing")) return v.slice(0, -3);
  if (v.endsWith("ed")) return v.slice(0, -2);
  if (v.endsWith("s") && !v.endsWith("ss")) return v.slice(0, -1);
  return v;
}

function findWordByEnglishPhrase(phrase, typeFilter = null) {
  let q = phrase.toLowerCase().trim();
  if (!q) return null;

  const matches = (x, queryString) => {
    if (typeFilter && x.t !== typeFilter) return false;
    let def = x.e.toLowerCase().trim();
    if (def === queryString) return true;
    
    let options = def.split(/[,;\/]+|\bor\b/).map(o => o.trim());
    if (options.some(opt => opt === queryString || queryString === opt)) return true;
    
    let cleanQ = queryString.startsWith("to ") ? queryString.substring(3).trim() : queryString;
    let cleanOptions = options.map(opt => opt.startsWith("to ") ? opt.substring(3).trim() : opt);
    if (cleanOptions.some(opt => opt === cleanQ || cleanQ === opt)) return true;
